name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix flake check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check flake
        run: nix flake check --all-systems
